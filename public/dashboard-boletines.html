<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Boletines — AprendeBA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy:#1A3C5E; --teal:#0E7490; --teal2:#2FA89C;
  --green:#059669; --orange:#d97706; --red:#dc2626;
  --bg:#f0f4f8; --white:#fff; --border:#d1dce8; --shadow:0 2px 8px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:#1e2a3a;font-size:13.5px;}
header{background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);color:white;padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
header h1{font-size:17px;font-weight:800;}
header p{font-size:11.5px;opacity:.8;}
.import-bar{background:var(--white);border-bottom:2px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.import-bar label{font-size:12.5px;font-weight:600;color:var(--navy);}
.btn{background:var(--teal);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:var(--navy);}
.btn-out{background:#fff;color:var(--teal);border:1.5px solid var(--teal);}
.modulo-tabs{display:flex;gap:8px;padding:14px 24px 0;}
.mtab{padding:8px 18px;border-radius:8px 8px 0 0;border:1.5px solid var(--border);background:#fff;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--navy);border-bottom:2px solid transparent;}
.mtab.act{background:var(--teal);color:#fff;border-color:var(--teal);}
.main{padding:16px 24px 40px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:var(--shadow);text-align:center;}
.card .n{font-size:32px;font-weight:900;}
.card .l{font-size:11px;color:#888;margin-top:3px;}
.card.ok .n{color:var(--green);}
.card.warn .n{color:var(--orange);}
.card.err .n{color:var(--red);}
.card.total .n{color:var(--navy);}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.chart-box{background:#fff;border-radius:12px;padding:16px;box-shadow:var(--shadow);}
.chart-box h3{font-size:11.5px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.filters{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);}
.filters select,.filters input{padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12.5px;}
.filters input{width:220px;}
#count-badge{margin-left:auto;background:#e0f4f8;color:var(--teal);padding:3px 12px;border-radius:14px;font-size:12px;font-weight:700;}
.table-wrap{overflow-x:auto;border-radius:10px;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;background:#fff;}
thead tr{background:var(--navy);color:#fff;font-size:11.5px;}
thead th{padding:9px 12px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;}
thead th:hover{background:var(--teal);}
tbody tr{border-bottom:1px solid #edf1f7;transition:background .1s;}
tbody tr:hover{background:#f8fafc;}
td{padding:8px 12px;font-size:12.5px;}
.pct-bar{display:flex;align-items:center;gap:8px;}
.pct-track{flex:1;background:#e8ecf0;border-radius:10px;height:10px;overflow:hidden;min-width:80px;}
.pct-fill{height:10px;border-radius:10px;transition:width .4s;}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.badge-ok{background:#d1fae5;color:#065f46;}
.badge-warn{background:#fef3c7;color:#92400e;}
.badge-err{background:#fee2e2;color:#991b1b;}
@media(max-width:768px){.charts-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div>
    <h1>📊 Dashboard Boletines — AprendeBA</h1>
    <p id="hdr-sub">Cargando datos...</p>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
    <a href="https://aprendeba-docs.vercel.app/" style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;">← Hub</a>
  </div>
</header>

<div class="import-bar">
  <label>📥 Actualizar datos:</label>
  <input type="file" id="xlsx-input" accept=".xlsx,.csv" style="display:none" onchange="importarArchivo(this)">
  <button class="btn" onclick="document.getElementById('xlsx-input').click()">Importar Excel / CSV</button>
  <span id="import-msg" style="font-size:12px;color:var(--green);font-weight:600;"></span>
  <div class="modulo-tabs" style="margin-left:auto;padding:0;">
    <button class="mtab act" onclick="cambiarModulo('boletines',this)">📄 Boletines</button>
    <button class="mtab" onclick="cambiarModulo('presentismo',this)">📋 Presentismo</button>
    <button class="mtab" onclick="cambiarModulo('calificaciones',this)">📝 Calificaciones</button>
  </div>
</div>

<div class="main">
  <!-- MÉTRICAS -->
  <div class="cards" id="cards-wrap"></div>

  <!-- GRÁFICOS -->
  <div class="charts-row">
    <div class="chart-box">
      <h3>% por Nivel</h3>
      <canvas id="chart-nivel" style="max-height:200px;"></canvas>
    </div>
    <div class="chart-box">
      <h3>Distribución por Estado</h3>
      <canvas id="chart-estado" style="max-height:200px;"></canvas>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filters">
    <input id="fq" type="text" placeholder="Buscar establecimiento..." oninput="filtrar()">
    <select id="fn" onchange="filtrar()">
      <option value="">Todos los niveles</option>
      <option value="Primario">Primario</option>
      <option value="Secundario">Secundario</option>
      <option value="Inicial">Inicial</option>
    </select>
    <select id="fde" onchange="filtrar()">
      <option value="">Todos los DE</option>
    </select>
    <select id="fest" onchange="filtrar()">
      <option value="">Todos los estados</option>
      <option value="ok">✅ Completo (100%)</option>
      <option value="warn">⚠️ En progreso (50-99%)</option>
      <option value="err">🔴 Bajo (&lt;50%)</option>
    </select>
    <span id="count-badge">— escuelas</span>
  </div>

  <!-- TABLA -->
  <div class="table-wrap">
    <table id="tabla">
      <thead><tr>
        <th onclick="sortBy('de')">DE ▲▼</th>
        <th onclick="sortBy('nivel')">Nivel ▲▼</th>
        <th onclick="sortBy('escuela')">Establecimiento ▲▼</th>
        <th onclick="sortBy('pct')" style="width:180px;">% Carga ▲▼</th>
        <th>Estado</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

let DATA = DATA_MODULOS.boletines.slice();
let sortCol = 'pct', sortDir = 1;

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('load', function init() {
  // Populate DE filter
  const des = [...new Set(DATA.map(d=>d.de))].sort((a,b)=>a-b);
  const sel = document.getElementById('fde');
  des.forEach(de => {
    const o = document.createElement('option');
    o.value = de; o.textContent = 'DE ' + de; sel.append(o);
  });
  actualizarHeader();
  filtrar();
})();

function actualizarHeader() {
  const total = DATA.length;
  const prom = total ? (DATA.reduce((s,d)=>s+d.pct,0)/total).toFixed(1) : 0;
  const modName = {boletines:'Boletines', presentismo:'Presentismo', calificaciones:'Calificaciones'};
  document.getElementById('hdr-sub').textContent =
    modName[MODULO_ACTUAL] + ' · ' + total + ' establecimientos · Promedio: ' + prom + '%';
}

function cambiarModulo(mod, btn) {
  MODULO_ACTUAL = mod;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  DATA = DATA_MODULOS[mod].slice();
  // Repopulate DE filter
  const des = [...new Set(DATA.map(d=>d.de))].sort((a,b)=>a-b);
  const sel = document.getElementById('fde');
  sel.innerHTML = '<option value="">Todos los DE</option>';
  des.forEach(de => {
    const o = document.createElement('option'); o.value=de; o.textContent='DE '+de; sel.append(o);
  });
  actualizarHeader();
  filtrar();
}

// ── FILTER & RENDER ──────────────────────────────────────────
function filtrar() {
  const q   = document.getElementById('fq').value.toLowerCase();
  const niv = document.getElementById('fn').value;
  const de  = document.getElementById('fde').value;
  const est = document.getElementById('fest').value;

  let rows = DATA.filter(d => {
    const mq = !q || d.escuela.toLowerCase().includes(q) || d.nombre_completo.toLowerCase().includes(q);
    const mn = !niv || d.nivel === niv;
    const md = !de  || d.de == de;
    const me = !est || (est==='ok'&&d.pct>=100) || (est==='warn'&&d.pct>=50&&d.pct<100) || (est==='err'&&d.pct<50);
    return mq&&mn&&md&&me;
  });

  // Sort
  rows.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase(), vb = vb.toLowerCase();
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });

  document.getElementById('count-badge').textContent = rows.length + ' establecimientos';
  renderTabla(rows);
  renderCards(rows);
  renderCharts(rows);
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  filtrar();
}

function pctColor(p) {
  if (p >= 100) return '#059669';
  if (p >= 75)  return '#10b981';
  if (p >= 50)  return '#f59e0b';
  return '#dc2626';
}

function estadoBadge(p) {
  if (p >= 100) return '<span class="badge badge-ok">✅ Completo</span>';
  if (p >= 50)  return '<span class="badge badge-warn">⚠️ En progreso</span>';
  return '<span class="badge badge-err">🔴 Bajo</span>';
}

function renderTabla(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:#aaa;">Sin resultados</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(d => `
    <tr>
      <td style="font-weight:700;color:var(--navy);">DE ${d.de}</td>
      <td>${d.nivel}</td>
      <td>${d.escuela}</td>
      <td>
        <div class="pct-bar">
          <div class="pct-track">
            <div class="pct-fill" style="width:${Math.min(d.pct,100)}%;background:${pctColor(d.pct)};"></div>
          </div>
          <span style="font-weight:700;color:${pctColor(d.pct)};min-width:42px;">${d.pct}%</span>
        </div>
      </td>
      <td>${estadoBadge(d.pct)}</td>
    </tr>`).join('');
}

function renderCards(rows) {
  const total = rows.length;
  const prom  = total ? (rows.reduce((s,d)=>s+d.pct,0)/total) : 0;
  const completos = rows.filter(d=>d.pct>=100).length;
  const progreso  = rows.filter(d=>d.pct>=50&&d.pct<100).length;
  const bajos     = rows.filter(d=>d.pct<50).length;

  document.getElementById('cards-wrap').innerHTML = `
    <div class="card total"><div class="n">${total}</div><div class="l">Establecimientos</div></div>
    <div class="card total"><div class="n" style="color:var(--teal);">${prom.toFixed(1)}%</div><div class="l">Promedio general</div>
      <div style="background:#e8ecf0;border-radius:6px;height:6px;margin-top:8px;overflow:hidden;">
        <div style="width:${prom}%;height:6px;background:var(--teal);border-radius:6px;"></div>
      </div>
    </div>
    <div class="card ok"><div class="n">${completos}</div><div class="l">✅ Completos (100%)</div></div>
    <div class="card warn"><div class="n">${progreso}</div><div class="l">⚠️ En progreso (50-99%)</div></div>
    <div class="card err"><div class="n">${bajos}</div><div class="l">🔴 Bajo (&lt;50%)</div></div>
  `;
}

let chartNivel = null, chartEstado = null;
function renderCharts(rows) {
  // By nivel
  const niveles = {};
  rows.forEach(d => {
    if (!niveles[d.nivel]) niveles[d.nivel] = [];
    niveles[d.nivel].push(d.pct);
  });
  const nLabels = Object.keys(niveles);
  const nAvgs   = nLabels.map(k => +(niveles[k].reduce((s,v)=>s+v,0)/niveles[k].length).toFixed(1));

  const ctx1 = document.getElementById('chart-nivel');
  if (chartNivel) chartNivel.destroy();
  chartNivel = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: nLabels,
      datasets: [{ data: nAvgs,
        backgroundColor: ['#0E7490','#059669','#d97706'],
        borderRadius: 8, barThickness: 40 }]
    },
    options: {
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.raw}% promedio` } } },
      scales: {
        y: { min:0, max:100, ticks: { callback: v => v+'%' }, grid: { color:'#f0f0f0' } },
        x: { grid: { display: false } }
      },
      responsive: true, maintainAspectRatio: false
    }
  });

  // Estado distribution
  const ok   = rows.filter(d=>d.pct>=100).length;
  const warn = rows.filter(d=>d.pct>=50&&d.pct<100).length;
  const err  = rows.filter(d=>d.pct<50).length;
  const ctx2 = document.getElementById('chart-estado');
  if (chartEstado) chartEstado.destroy();
  chartEstado = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: ['Completo (100%)', 'En progreso (50-99%)', 'Bajo (<50%)'],
      datasets: [{ data: [ok, warn, err],
        backgroundColor: ['#059669','#f59e0b','#dc2626'],
        borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { size:11 }, padding:10, boxWidth:12 } },
        tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw} escuelas` } }
      },
      responsive: true, maintainAspectRatio: false
    }
  });
}

// ── IMPORT ───────────────────────────────────────────────────
function importarArchivo(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Parse CSV
    const text = e.target.result;
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    if (lines.length < 2) { alert('Archivo vacío'); return; }
    const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const nameIdx = headers.findIndex(h=>h.includes('establecimiento') || h.includes('escuela'));
    const pctIdx  = headers.findIndex(h=>h.includes('%') || h.includes('pct') || h.includes('porcentaje'));
    if (nameIdx < 0 || pctIdx < 0) { alert('No se encontraron columnas de escuela y porcentaje'); return; }
    const newData = lines.slice(1).map(line => {
      const parts = line.split(',');
      const name = (parts[nameIdx]||'').replace(/^"|"$/g,'').trim();
      const pct  = parseFloat((parts[pctIdx]||'0').replace('%',''));
      if (!name) return null;
      const deM = name.match(/DE (\d+)/);
      const lvParts = name.rsplit ? name.rsplit(' - ',1) : name.split(' - ');
      const nivel = lvParts[lvParts.length-1]?.trim() || '';
      const escuela = name.replace(/^DE \d+- /,'').replace(/ DE \d+ - .*$/,'').trim();
      return { de: deM?parseInt(deM[1]):0, nivel, escuela, nombre_completo:name, pct: isNaN(pct)?pct*100:pct };
    }).filter(Boolean);
    DATA_MODULOS[MODULO_ACTUAL] = newData;
    DATA = newData;
    document.getElementById('import-msg').textContent = '✓ ' + newData.length + ' escuelas importadas';
    filtrar();
    setTimeout(()=>document.getElementById('import-msg').textContent='', 4000);
  };
  reader.readAsText(file, 'UTF-8');
  input.value='';
}
</script>
