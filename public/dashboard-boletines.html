<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Carga Escuelas — AprendeBA</title>
<style>
:root{--navy:#1A3C5E;--teal:#0E7490;--teal2:#2FA89C;--green:#059669;--orange:#d97706;--red:#dc2626;--bg:#f0f4f8;--white:#fff;--border:#d1dce8;--shadow:0 2px 8px rgba(0,0,0,.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:#1e2a3a;font-size:13.5px;}
header{background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);color:white;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
header h1{font-size:16px;font-weight:800;flex:1;}
header p{font-size:11px;opacity:.8;margin-top:2px;}
.toolbar{background:var(--white);border-bottom:2px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.modulo-btns{display:flex;gap:6px;}
.mbtn{padding:7px 14px;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);}
.mbtn.act{background:var(--teal);color:#fff;border-color:var(--teal);}
.periodo-btns{display:flex;gap:4px;margin-left:8px;}
.pbtn{padding:5px 10px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:#555;}
.pbtn.act{background:var(--navy);color:#fff;border-color:var(--navy);}
#periodo-wrap{display:none;}
.btn-imp{background:var(--teal);color:#fff;border:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto;}
#import-msg{font-size:11.5px;color:var(--green);font-weight:600;}
.main{padding:14px 16px 40px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);text-align:center;}
.card .n{font-size:28px;font-weight:900;line-height:1;}
.card .l{font-size:10.5px;color:#888;margin-top:3px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.chart-box{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);}
.chart-box h3{font-size:10.5px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.filters{background:#fff;border-radius:8px;padding:9px 12px;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);}
.filters select,.filters input{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;}
.filters input{width:210px;}
#count-b{margin-left:auto;background:#e0f4f8;color:var(--teal);padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;}
.tbl-wrap{overflow-x:auto;border-radius:10px;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;background:#fff;}
thead th{background:var(--navy);color:#fff;font-size:11px;padding:8px 11px;text-align:left;cursor:pointer;white-space:nowrap;}
thead th:hover{background:var(--teal);}
tbody tr{border-bottom:1px solid #edf1f7;transition:background .1s;}
tbody tr:hover{background:#f8fafc;}
td{padding:7px 11px;font-size:12px;}
.bar-row{display:flex;align-items:center;gap:7px;}
.bar-track{flex:1;background:#e8ecf0;border-radius:8px;height:9px;overflow:hidden;min-width:70px;}
.bar-fill{height:9px;border-radius:8px;}
.badge{display:inline-block;padding:2px 7px;border-radius:7px;font-size:10.5px;font-weight:700;}
.b-ok{background:#d1fae5;color:#065f46;}
.b-warn{background:#fef3c7;color:#92400e;}
.b-err{background:#fee2e2;color:#991b1b;}
@media(max-width:700px){.charts-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="hdr-title">📊 Dashboard Carga Escuelas — AprendeBA</h1>
    <p id="hdr-sub">Cargando...</p>
  </div>
  <a href="https://aprendeba-docs.vercel.app/" style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;">← Hub</a>
</header>

<div class="toolbar">
  <div class="modulo-btns">
    <button class="mbtn act" onclick="cambiarModulo('boletines',this)">📄 Boletines</button>
    <button class="mbtn" onclick="cambiarModulo('calificaciones',this)">📝 Calificaciones</button>
    <button class="mbtn" onclick="cambiarModulo('presentismo',this)">📋 Presentismo</button>
  </div>
  <div class="periodo-btns" id="periodo-wrap">
    <button class="pbtn act" onclick="cambiarPeriodo('1° Bimestre',this)">1° Bim</button>
    <button class="pbtn" onclick="cambiarPeriodo('2° Bimestre',this)">2° Bim</button>
    <button class="pbtn" onclick="cambiarPeriodo('3° Bimestre',this)">3° Bim</button>
    <button class="pbtn" onclick="cambiarPeriodo('4° Bimestre',this)">4° Bim</button>
  </div>
  <input type="file" id="file-imp" accept=".xlsx,.csv" style="display:none" onchange="importar(this)">
  <button class="btn-imp" onclick="document.getElementById('file-imp').click()">📥 Importar datos</button>
  <span id="import-msg"></span>
</div>

<div class="main">
  <div class="cards" id="cards"></div>
  <div class="charts-row">
    <div class="chart-box"><h3>% por Nivel / Tipo</h3><div id="chart-nivel"></div></div>
    <div class="chart-box"><h3>Distribución por Estado</h3><div id="chart-estado"></div></div>
  </div>
  <div class="filters">
    <input id="fq" type="text" placeholder="Buscar establecimiento..." oninput="filtrar()">
    <select id="fde" onchange="filtrar()"><option value="">Todos los DE</option></select>
    <select id="fniv" onchange="filtrar()"><option value="">Todos los niveles</option></select>
    <select id="fest" onchange="filtrar()">
      <option value="">Todos los estados</option>
      <option value="ok">✅ Completo</option>
      <option value="warn">⚠️ En progreso</option>
      <option value="err">🔴 Bajo</option>
    </select>
    <span id="count-b">—</span>
  </div>
  <div class="tbl-wrap">
    <table><thead><tr>
      <th onclick="srt('de')">DE</th>
      <th onclick="srt('nivel')">Nivel</th>
      <th onclick="srt('escuela')">Establecimiento</th>
      <th onclick="srt('pct')" style="width:160px;">% Carga</th>
      <th>Estado</th>
    </tr></thead><tbody id="tbody"></tbody></table>
  </div>
</div>

};

let MOD = 'boletines';
let PERIODO = '1° Bimestre';
let DATA = [];
let SC = 'pct', SD = -1;

function getRows() {
  const src = DB[MOD];
  if (!src.length) return [];
  // Multi-period format (has .periodo field)
  if (src[0].periodo) return src.filter(d => d.periodo === PERIODO);
  return src;
}

function init() {
  DATA = getRows();
  poblarFiltros();
  filtrar();
  actualizarHeader();
}

function actualizarHeader() {
  const rows = getRows();
  const prom = rows.length ? (rows.reduce((s,d)=>s+d.pct,0)/rows.length).toFixed(1) : 0;
  const nombres = {boletines:'Boletines',calificaciones:'Calificaciones',presentismo:'Presentismo'};
  const per = DB[MOD][0]?.periodo ? ' · ' + PERIODO : '';
  document.getElementById('hdr-sub').textContent =
    nombres[MOD] + per + ' · ' + rows.length + ' establecimientos · Promedio: ' + prom + '%';
}

function cambiarModulo(mod, btn) {
  MOD = mod;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  const hasPeriodo = DB[mod].length && DB[mod][0].periodo;
  document.getElementById('periodo-wrap').style.display = hasPeriodo ? 'flex' : 'none';
  PERIODO = '1° Bimestre';
  document.querySelectorAll('.pbtn').forEach((b,i)=>b.classList.toggle('act',i===0));
  init();
}

function cambiarPeriodo(p, btn) {
  PERIODO = p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  init();
}

function poblarFiltros() {
  const des = [...new Set(DATA.map(d=>d.de))].sort((a,b)=>a-b);
  const nivs = [...new Set(DATA.map(d=>d.nivel))].sort();
  const fde = document.getElementById('fde');
  fde.innerHTML = '<option value="">Todos los DE</option>';
  des.forEach(de => { const o=document.createElement('option'); o.value=de; o.textContent='DE '+de; fde.append(o); });
  const fniv = document.getElementById('fniv');
  fniv.innerHTML = '<option value="">Todos los niveles</option>';
  nivs.forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; fniv.append(o); });
}

function filtrar() {
  const q   = document.getElementById('fq').value.toLowerCase();
  const de  = document.getElementById('fde').value;
  const niv = document.getElementById('fniv').value;
  const est = document.getElementById('fest').value;
  let rows = DATA.filter(d => {
    const mq = !q  || d.escuela.toLowerCase().includes(q) || (d.nombre_completo||'').toLowerCase().includes(q);
    const md = !de  || d.de == de;
    const mn = !niv || d.nivel === niv;
    const me = !est || (est==='ok'&&d.pct>=99) || (est==='warn'&&d.pct>=50&&d.pct<99) || (est==='err'&&d.pct<50);
    return mq&&md&&mn&&me;
  });
  rows.sort((a,b)=>{ let va=a[SC],vb=b[SC]; if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();} return (va<vb?-1:va>vb?1:0)*SD; });
  document.getElementById('count-b').textContent = rows.length + ' establecimientos';
  renderTabla(rows);
  renderCards(rows);
  renderCharts(rows);
}

function srt(col) { if(SC===col)SD*=-1; else{SC=col;SD=1;} filtrar(); }

function pctCol(p){ return p>=99?'#059669':p>=75?'#10b981':p>=50?'#f59e0b':'#dc2626'; }
function badge(p){ return p>=99?'<span class="badge b-ok">✅ Completo</span>':p>=50?'<span class="badge b-warn">⚠️ Progreso</span>':'<span class="badge b-err">🔴 Bajo</span>'; }

function renderTabla(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px;color:#aaa;">Sin resultados</td></tr>'; return; }
  tbody.innerHTML = rows.map(d=>`<tr>
    <td style="font-weight:700;color:var(--navy);">DE ${d.de}</td>
    <td>${d.nivel}</td>
    <td title="${d.nombre_completo||d.escuela}">${d.escuela}</td>
    <td><div class="bar-row">
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(d.pct,100)}%;background:${pctCol(d.pct)};"></div></div>
      <span style="font-weight:700;color:${pctCol(d.pct)};min-width:40px;">${d.pct}%</span>
    </div></td>
    <td>${badge(d.pct)}</td>
  </tr>`).join('');
}

function renderCards(rows) {
  const total = rows.length;
  const prom  = total ? (rows.reduce((s,d)=>s+d.pct,0)/total) : 0;
  const ok    = rows.filter(d=>d.pct>=99).length;
  const warn  = rows.filter(d=>d.pct>=50&&d.pct<99).length;
  const err   = rows.filter(d=>d.pct<50).length;
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="n" style="color:var(--navy);">${total}</div><div class="l">Establecimientos</div></div>
    <div class="card"><div class="n" style="color:var(--teal);">${prom.toFixed(1)}%</div>
      <div style="background:#e8ecf0;border-radius:6px;height:6px;margin:6px 0 3px;overflow:hidden;">
        <div style="width:${Math.min(prom,100)}%;height:6px;background:var(--teal);border-radius:6px;"></div></div>
      <div class="l">Promedio general</div></div>
    <div class="card"><div class="n" style="color:var(--green);">${ok}</div><div class="l">✅ Completos</div></div>
    <div class="card"><div class="n" style="color:var(--orange);">${warn}</div><div class="l">⚠️ En progreso</div></div>
    <div class="card"><div class="n" style="color:var(--red);">${err}</div><div class="l">🔴 Bajo (&lt;50%)</div></div>`;
}

function renderCharts(rows) {
  // Chart 1: Barras por nivel
  const nivMap = {};
  rows.forEach(d=>{ if(!nivMap[d.nivel])nivMap[d.nivel]=[]; nivMap[d.nivel].push(d.pct); });
  const nLabels = Object.keys(nivMap);
  const nAvgs   = nLabels.map(k=>(nivMap[k].reduce((s,v)=>s+v,0)/nivMap[k].length).toFixed(1));
  const cols    = ['#0E7490','#059669','#d97706','#7c3aed','#dc2626'];
  const bH=34,gap=10,pL=110,svgH=nLabels.length*(bH+gap)+gap;
  const svg1 = nLabels.map((lbl,i)=>{
    const w=Math.round((nAvgs[i]/100)*280);
    const y=gap+i*(bH+gap);
    return `<text x="${pL-6}" y="${y+bH/2+4}" text-anchor="end" font-size="11" fill="#555">${lbl}</text>
    <rect x="${pL}" y="${y}" width="${w}" height="${bH}" rx="5" fill="${cols[i%cols.length]}" opacity=".85"/>
    <text x="${pL+w+5}" y="${y+bH/2+4}" font-size="11" font-weight="700" fill="${cols[i%cols.length]}">${nAvgs[i]}%</text>`;
  }).join('');
  document.getElementById('chart-nivel').innerHTML = nLabels.length
    ? `<svg width="100%" viewBox="0 0 400 ${svgH}" xmlns="http://www.w3.org/2000/svg">${svg1}</svg>`
    : '<p style="color:#aaa;text-align:center;padding:20px;">Sin datos</p>';

  // Chart 2: Donut SVG
  const ok=rows.filter(d=>d.pct>=99).length, warn=rows.filter(d=>d.pct>=50&&d.pct<99).length, err=rows.filter(d=>d.pct<50).length;
  const tot=ok+warn+err||1;
  const segs=[{v:ok,c:'#059669',l:'✅ '+ok+' completos'},{v:warn,c:'#f59e0b',l:'⚠️ '+warn+' progreso'},{v:err,c:'#dc2626',l:'🔴 '+err+' bajo'}];
  const cx=90,cy=85,R=65,ri=40; let ang=-Math.PI/2;
  const paths=segs.map(s=>{
    if(!s.v)return '';
    const a=(s.v/tot)*2*Math.PI;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    ang+=a;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const la=a>Math.PI?1:0;
    const ix1=cx+ri*Math.cos(ang-a),iy1=cy+ri*Math.sin(ang-a);
    const ix2=cx+ri*Math.cos(ang),iy2=cy+ri*Math.sin(ang);
    return `<path d="M${x1},${y1} A${R},${R} 0 ${la},1 ${x2},${y2} L${ix2},${iy2} A${ri},${ri} 0 ${la},0 ${ix1},${iy1} Z" fill="${s.c}"/>`;
  }).join('');
  const prom2=rows.length?(rows.reduce((s,d)=>s+d.pct,0)/rows.length).toFixed(1):0;
  const legs=segs.filter(s=>s.v>0).map((s,i)=>`<text x="170" y="${22+i*22}" font-size="11" fill="#333">${s.l}</text>`).join('');
  document.getElementById('chart-estado').innerHTML = `<svg width="100%" viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg">
    ${paths}<circle cx="${cx}" cy="${cy}" r="${ri}" fill="white"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="16" font-weight="800" fill="#1A3C5E">${prom2}%</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="9" fill="#888">promedio</text>${legs}</svg>`;
}

// Import CSV
function importar(input) {
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert('Archivo vacío');return;}
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const iNombre=headers.findIndex(h=>h.includes('establecimiento')||h.includes('escuela'));
    const iPct=headers.findIndex(h=>h.includes('cargadas')||h.includes('%bol')||h.includes('pct'));
    const iPeriodo=headers.findIndex(h=>h.includes('periodo')||h.includes('bimestre'));
    if(iNombre<0||iPct<0){alert('No se encontraron columnas requeridas');return;}
    const parsed=lines.slice(1).map(line=>{
      const p=line.split(',');
      const nombre=(p[iNombre]||'').replace(/^"|"$/g,'').trim();
      if(!nombre)return null;
      const pctRaw=parseFloat((p[iPct]||'0').replace('%','').replace(/^"|"$/g,''));
      const pct=isNaN(pctRaw)?0:pctRaw>1?pctRaw:pctRaw*100;
      const deM=nombre.match(/DE (\d+)/);
      const de=deM?parseInt(deM[1]):0;
      const partes=nombre.split(' - ');
      const nivel=partes[partes.length-1]?.trim()||'—';
      const escuela=nombre.replace(/^DE \d+- /,'').replace(/ DE \d+ - .*$/,'').replace(/ DE \d+\s*$/,'').trim();
      const periodo=iPeriodo>=0?(p[iPeriodo]||'').replace(/^"|"$/g,'').trim():'';
      return {de,nivel,escuela,nombre_completo:nombre,pct:Math.round(pct*10)/10,periodo};
    }).filter(Boolean);
    DB[MOD]=parsed;
    document.getElementById('import-msg').textContent='✓ '+parsed.length+' filas importadas';
    setTimeout(()=>document.getElementById('import-msg').textContent='',4000);
    const hasPer=parsed[0]?.periodo;
    document.getElementById('periodo-wrap').style.display=hasPer?'flex':'none';
    init();
  };
  reader.readAsText(file,'UTF-8');
  input.value='';
}

// Init
window.addEventListener('load', init);
